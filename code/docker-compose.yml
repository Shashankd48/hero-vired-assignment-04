services:

  backend:

    build: ./backend

    container_name: backend

    restart: always

    env_file:

      - ./backend/.env

  frontend:

    build: ./frontend

    container_name: frontend

    restart: always

  nginx:

    image: nginx:latest

    container_name: nginx

    ports:

      - "80:80"

    volumes:

      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:

      - backend

      - frontend
