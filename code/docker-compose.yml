version: "3.9"

services:

  backend:

    build: ./backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    expose:
      - "3000"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - app-network

  frontend:

    build: ./frontend

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - app-network

networks:

  app-network:
    driver: bridge
