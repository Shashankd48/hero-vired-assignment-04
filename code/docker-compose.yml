version: "3.9"

services:

  backend:
    build: ./backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - app-network

  frontend:
    build: ./frontend

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - app-network

  nginx:
    image: nginx:alpine

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - app-network

networks:
  app-network:
    driver: bridge
